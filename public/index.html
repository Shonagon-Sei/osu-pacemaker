<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>osu! Local Leaderboard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- The whole overlay. Transparent background so it composites over gameplay in OBS.
       #header doubles as the drag handle; #resize-handle scales the panel.
       Both (and the gear) are only interactive when the overlay is "unlocked". -->
  <div id="overlay">
    <div id="header">
      <span id="grip" title="drag to move">⠿</span>
      <span id="map-title">Initializing…</span>
      <span id="conn" class="disconnected" title="relay status"></span>
      <button id="config-btn" title="settings">⚙</button>
    </div>

    <div id="paused-badge">❚❚ PAUSED</div>

    <!-- Bars are absolutely positioned; JS sets each bar's transform: translateY().
         Sorting = recomputing those Y offsets every frame, with a CSS transition
         on transform so a rank change slides smoothly. -->
    <div id="board"></div>

    <div id="status"></div>

    <div id="resize-handle" title="drag to resize"></div>
  </div>

  <!-- Bar template, cloned per player. -->
  <template id="bar-template">
    <div class="bar">
      <div class="rank"></div>
      <div class="info">
        <div class="name"></div>
        <div class="sub"><span class="mods"></span><span class="s1"></span><span class="s2"></span></div>
      </div>
      <div class="score"></div>
    </div>
  </template>

  <!-- Settings panel. Controls are generated by overlay.js from a schema. -->
  <div id="config-panel" hidden>
    <div id="config-head">
      <span>Overlay settings</span>
      <button id="config-close" title="close">✕</button>
    </div>
    <div id="config-body"></div>
    <div id="config-foot">
      <button id="config-reset">Reset to defaults</button>
      <span id="config-hint">Ctrl+Shift+L locks/unlocks the in-game overlay</span>
    </div>
  </div>

  <script src="overlay.js"></script>
</body>
</html>
